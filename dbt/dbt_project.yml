name: "denial_platform"
version: "1.0.0"
config-version: 2

profile: "denial_platform"

# ── Paths ─────────────────────────────────────────────────────
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Model Configuration ───────────────────────────────────────
models:
  denial_platform:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

# ── Seeds Configuration ───────────────────────────────────────
seeds:
  denial_platform:
    +schema: seeds

# ── Snapshot Configuration ─────────────────────────────────────
snapshots:
  denial_platform:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at
